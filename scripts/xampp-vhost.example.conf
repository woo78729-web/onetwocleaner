# XAMPP Apache 虛擬主機範例
# 1. 複製此檔內容到 C:\xampp\apache\conf\extra\httpd-vhosts.conf 末尾
# 2. 確認 C:\xampp\apache\conf\httpd.conf 有 Include conf/extra/httpd-vhosts.conf
# 3. 重啟 Apache
# 4. 瀏覽器開啟 http://127.0.0.1/spa/login

<VirtualHost *:80>
    DocumentRoot "C:/Users/ATai/Documents/東東/public"
    ServerName 127.0.0.1
    <Directory "C:/Users/ATai/Documents/東東/public">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
